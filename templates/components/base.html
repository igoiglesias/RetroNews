<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}RetroNews — noticias dev com comentarios de IA{% endblock %}</title>
    <meta name="description" content="{% block descricao %}RetroNews — agregador de noticias dev com comentarios de IA. Software, arquitetura, low-level e mais.{% endblock %}">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large">
    <link rel="canonical" href="{% block canonical %}{{ site_url }}{{ request.url.path }}{% endblock %}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📟</text></svg>">

    <!-- Open Graph -->
    <meta property="og:title" content="{{ self.titulo() }}">
    <meta property="og:description" content="{{ self.descricao() }}">
    <meta property="og:url" content="{{ self.canonical() }}">
    <meta property="og:type" content="{% block og_type %}website{% endblock %}">
    <meta property="og:site_name" content="RetroNews">
    <meta property="og:locale" content="pt_BR">
    <meta property="og:image" content="{% block og_image %}{{ site_url }}/static/img/og-default.png{% endblock %}">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ self.titulo() }}">
    <meta name="twitter:description" content="{{ self.descricao() }}">
    <meta name="twitter:image" content="{{ self.og_image() }}">

    <link rel="stylesheet" href="/static/css/style.css">
    {% block head %}{% endblock %}

    <!-- Structured Data -->
    {% block jsonld %}
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "RetroNews",
        "url": "{{ site_url }}",
        "description": "Agregador de noticias dev com comentarios de IA",
        "inLanguage": "pt-BR",
        "potentialAction": {
            "@type": "SearchAction",
            "target": "{{ site_url }}/?q={search_term_string}",
            "query-input": "required name=search_term_string"
        }
    }
    </script>
    {% endblock %}
</head>
<body>
    <div class="container">
        {% include "components/header.html" %}

        <main>
            {% block conteudo %}{% endblock %}
        </main>

        {% include "components/footer.html" %}
    </div>

    <script src="/static/js/main.js" defer></script>
    {% block scripts %}{% endblock %}
</body>
</html>
