<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RetroNews — agregador de noticias dev com comentarios de IA. Software, arquitetura, low-level, retro computing e mais.">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="robots" content="index, follow">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📟</text></svg>">
    <link rel="canonical" href="{% block canonical %}{% endblock %}">
    <title>{% block titulo %}RetroNews{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    <div class="container">
        {% include "components/header.html" %}

        <main>
            {% block conteudo %}{% endblock %}
        </main>

        {% include "components/footer.html" %}
    </div>

    <script src="/static/js/main.js" defer></script>
    {% block scripts %}{% endblock %}
</body>
</html>
